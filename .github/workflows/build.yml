name: Build Multi-Platform Image

on:
  workflow_dispatch:
permissions:
  contents: read
  packages: write

jobs:
  build-fips-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push with Bake
        uses: docker/bake-action@v5
        with:
          files: |
            docker-bake.hcl
            versions.hcl
          set: |
            *.platform=linux/amd64,linux/arm64
            *.cache-from=type=gha,scope=trixie-fips
            *.cache-to=type=gha,scope=trixie-fips,mode=max
          push: true

      - name: Run Trivy vulnerability scanner
        uses: aquasec/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.actor }}/debian-fips:latest'
          format: 'json'
          output: 'trivy-results.json'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerability-report
          path: trivy-results.json
